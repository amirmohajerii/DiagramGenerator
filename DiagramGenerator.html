<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EF Core ModelSnapshot → ERD Diagram</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: #334155;
            --success: #22c55e;
            --error: #ef4444;
            --radius: 12px;
        }

        * { margin: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: var(--surface);
            padding: 14px 22px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 14px;
            z-index: 20;
            box-shadow: 0 2px 14px rgba(0,0,0,0.35);
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-right: auto;
        }
        .badge {
            font-size: 0.7rem;
            background: var(--primary);
            color: #fff;
            padding: 3px 12px;
            border-radius: 20px;
            font-weight: 500;
        }
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .btn:hover { background: #363658; border-color: #5a5a80; }
        .btn-primary { background: var(--primary); border-color: var(--primary); color: #fff; font-weight: 600; }
        .btn-primary:hover { background: #5a6af0; }
        .btn-success { background: #16a34a; border-color: #16a34a; color: #fff; }
        .btn-success:hover { background: #15803d; }
        .btn:disabled { opacity: 0.4; pointer-events: none; cursor: not-allowed; }
        .status-bar {
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: #1e1e36;
            border-radius: 20px;
        }

        .main-container {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
            background: #f8fafc;
        }

        #diagram-wrapper {
            flex: 1;
            overflow: auto;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
            background: #f8fafc;
        }

        #diagram-wrapper img {
            max-width: none;
            cursor: grab;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-radius: 8px;
            background: white;
            transition: transform 0.1s ease;
        }

        #diagram-wrapper img:active {
            cursor: grabbing;
        }

        .placeholder-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #94a3b8;
            pointer-events: none;
            z-index: 5;
        }
        .placeholder-overlay.hidden { display: none; }

        .zoom-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 10;
        }
        .zoom-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid #cbd5e1;
            background: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.15s;
            color: #334155;
        }
        .zoom-btn:hover { background: #f1f5f9; }
        .zoom-level {
            font-size: 0.7rem;
            text-align: center;
            background: white;
            border-radius: 14px;
            padding: 3px 8px;
            border: 1px solid #cbd5e1;
            color: #475569;
            font-weight: 500;
        }

        .loading-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            z-index: 30;
            text-align: center;
            display: none;
        }
        .loading-overlay.active { display: block; }
        .spinner {
            border: 3px solid #e2e8f0;
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .stats-bar {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            padding: 8px 0;
        }
        .stat-chip {
            background: #1e293b;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .stat-chip strong { color: var(--text); }
    </style>
</head>
<body>

<div class="header">
    <h1>🗂️ EF Core ERD <span class="badge">PlantUML</span></h1>
    <div class="controls">
        <button class="btn" id="selectRootBtn">📁 Select Project Root</button>
        <button class="btn btn-primary" id="parseBtn" disabled>⚡ Generate Diagram</button>
        <button class="btn btn-success" id="downloadPngBtn" style="display:none;">🖼️ Download PNG</button>
        <button class="btn" id="downloadPumlBtn" style="display:none;">💾 Download .puml</button>
        <span class="status-bar" id="statusText">🔹 No project selected</span>
    </div>
    <div class="stats-bar" id="statsBar" style="display:none;"></div>
</div>

<div class="main-container">
    <div id="diagram-wrapper">
        <img id="diagramImage" src="" alt="ERD Diagram" style="display:none;" />
    </div>
    <div class="placeholder-overlay" id="placeholder">
        <p style="font-size:1.4rem; margin-bottom:6px;">📂</p>
        <p>Select your .NET project root folder</p>
        <p style="font-size:0.8rem; margin-top:6px;">Finds <code>Infrastructure/Migrations/*ModelSnapshot.cs</code></p>
    </div>
    <div class="zoom-controls" id="zoomControls" style="display:none;">
        <button class="zoom-btn" id="zoomInBtn" title="Zoom in">+</button>
        <span class="zoom-level" id="zoomLevel">100%</span>
        <button class="zoom-btn" id="zoomOutBtn" title="Zoom out">−</button>
        <button class="zoom-btn" id="zoomResetBtn" title="Reset zoom">⊡</button>
    </div>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p style="color:#475569; font-size:0.9rem;">Rendering diagram...</p>
    </div>
</div>

<script>
    // ============================================
    // MAIN APP
    // ============================================
    const selectRootBtn = document.getElementById('selectRootBtn');
    const parseBtn = document.getElementById('parseBtn');
    const downloadPngBtn = document.getElementById('downloadPngBtn');
    const downloadPumlBtn = document.getElementById('downloadPumlBtn');
    const statusText = document.getElementById('statusText');
    const statsBar = document.getElementById('statsBar');
    const diagramWrapper = document.getElementById('diagram-wrapper');
    const diagramImage = document.getElementById('diagramImage');
    const placeholder = document.getElementById('placeholder');
    const zoomControls = document.getElementById('zoomControls');
    const zoomInBtn = document.getElementById('zoomInBtn');
    const zoomOutBtn = document.getElementById('zoomOutBtn');
    const zoomResetBtn = document.getElementById('zoomResetBtn');
    const zoomLevelEl = document.getElementById('zoomLevel');
    const loadingOverlay = document.getElementById('loadingOverlay');

    let projectRootHandle = null;
    let projectRootName = '';
    let snapshotFileName = '';
    let generatedPuml = '';
    let currentScale = 1;
    let currentBlobUrl = null;

    function updateStatus(text, type = 'info') {
        statusText.innerHTML = text;
        statusText.style.color = type === 'success' ? '#4ade80' : type === 'error' ? '#f87171' : '#b0b0c8';
    }

    // ---- File System Access ----
    async function selectProjectRoot() {
        try {
            if (!window.showDirectoryPicker) {
                updateStatus('❌ Use Chrome or Edge for folder selection', 'error');
                alert('This browser does not support folder selection. Please use Chrome or Edge.');
                return;
            }

            const handle = await window.showDirectoryPicker({ mode: 'read' });
            projectRootHandle = handle;
            projectRootName = handle.name;
            console.log('Selected folder:', handle.name);

            let infraFound = false, migFound = false;
            try {
                const infraHandle = await handle.getDirectoryHandle('Infrastructure');
                infraFound = true;
                console.log('Infrastructure folder found');
                try {
                    await infraHandle.getDirectoryHandle('Migrations');
                    migFound = true;
                    console.log('Migrations folder found');
                } catch (e) {
                    console.log('Migrations not found:', e);
                }
            } catch (e) {
                console.log('Infrastructure not found:', e);
            }

            if (infraFound && migFound) {
                updateStatus(`✅ ${handle.name} — Infrastructure/Migrations/ found`, 'success');
                parseBtn.disabled = false;
            } else if (infraFound) {
                updateStatus(`⚠️ ${handle.name} — no Migrations/ subfolder`, 'error');
                parseBtn.disabled = true;
            } else {
                updateStatus(`⚠️ ${handle.name} — Infrastructure/ not found`, 'error');
                parseBtn.disabled = true;
            }
        } catch (err) {
            if (err.name !== 'AbortError') {
                console.error('Picker error:', err);
                updateStatus(`❌ ${err.message}`, 'error');
            }
        }
    }

    async function findSnapshotFile(rootHandle) {
        const infraHandle = await rootHandle.getDirectoryHandle('Infrastructure');
        const migHandle = await infraHandle.getDirectoryHandle('Migrations');
        for await (const [name, handle] of migHandle.entries()) {
            console.log('Found file in Migrations:', name);
            if (handle.kind === 'file' && name.endsWith('ModelSnapshot.cs')) {
                return { name, handle };
            }
        }
        throw new Error('No file ending with "ModelSnapshot.cs" found');
    }

    async function readFileContent(fileHandle) {
        const file = await fileHandle.getFile();
        return await file.text();
    }

    // ---- Parser ----
    function parseModelSnapshot(content) {
        const entities = [];
        const relationships = [];

        const entityRegex = /modelBuilder\.Entity\("([^"]+)"\s*,\s*b\s*=>\s*\{/g;
        const entityBlocks = [];
        let match;

        while ((match = entityRegex.exec(content)) !== null) {
            const fullType = match[1];
            const startIdx = match.index + match[0].length;
            let braceCount = 1;
            let endIdx = startIdx;
            for (let i = startIdx; i < content.length; i++) {
                if (content[i] === '{') braceCount++;
                else if (content[i] === '}') {
                    braceCount--;
                    if (braceCount === 0) { endIdx = i; break; }
                }
            }
            const body = content.substring(startIdx, endIdx);
            entityBlocks.push({ fullType, body, start: match.index, end: endIdx });
        }

        console.log('Entity blocks found:', entityBlocks.length);

        for (const block of entityBlocks) {
            const shortName = block.fullType.split('.').pop();
            const tableMatch = block.body.match(/\.ToTable\("([^"]+)"(?:,\s*\(string\)null)?\)/);
            const tableName = tableMatch ? tableMatch[1] : shortName;

            const propRegex = /b\.Property<([^>]+)>\("([^"]+)"\)/g;
            const ignoredProperties = ['Version', 'ModifyDate', 'CreatorUserId', 'CreateDate'];
            const properties = [];
            let pm;
            while ((pm = propRegex.exec(block.body)) !== null) {
                const propType = pm[1];
                const propName = pm[2];
                if (!ignoredProperties.includes(propName)) {
                    const exists = properties.find(p => p.name === propName);
                    if (!exists) {
                        properties.push({ name: propName, type: propType });
                    }
                }
            }

            entities.push({
                fullType: block.fullType,
                shortName,
                tableName,
                properties,
                start: block.start,
                end: block.end
            });
        }

        const entityMap = new Map(entities.map(e => [e.fullType, e]));

        const relRegex = /b\.HasOne\("([^"]+)"(?:,\s*"([^"]*)")?\)\s*\.WithMany\((?:"([^"]*)")?\)\s*\.HasForeignKey\("([^"]+)"\)/g;
        let rm;
        while ((rm = relRegex.exec(content)) !== null) {
            const targetFullType = rm[1];
            const foreignKey = rm[4];
            const relPos = rm.index;

            let sourceFullType = null;
            for (const ent of entities) {
                if (relPos > ent.start && relPos < ent.end) {
                    sourceFullType = ent.fullType;
                    break;
                }
            }

            if (sourceFullType && targetFullType) {
                relationships.push({
                    source: sourceFullType,
                    target: targetFullType,
                    foreignKey
                });
            }
        }

        console.log('Relationships found:', relationships.length);
        return { entities, relationships, entityMap };
    }

    // ---- Build PlantUML ----
    function buildPlantUML(entities, relationships, entityMap) {
        const lines = [];
        lines.push('@startuml');
        lines.push(`' Source: ${snapshotFileName}`);
        lines.push(`' Entities: ${entities.length} | Relationships: ${relationships.length}`);
        lines.push('');
        lines.push('left to right direction');
        lines.push('skinparam linetype ortho');
        lines.push('');
        lines.push('skinparam entity {');
        lines.push('    BackgroundColor White');
        lines.push('    BorderColor Black');
        lines.push('    FontName Arial');
        lines.push('    FontSize 12');
        lines.push('    StereotypeFontSize 0');
        lines.push('    StereotypeFontColor White');
        lines.push('}');
        lines.push('');

        const groups = new Map();
        for (const entity of entities) {
            const parts = entity.fullType.split('.');
            let groupName = 'Other';
            if (entity.fullType.includes('MassTransit')) groupName = 'MassTransit';
            else if (parts.length >= 3 && parts[0] === 'Domain' && parts[1] === 'Aggregates') groupName = parts[2].replace('Aggregate', '');
            if (!groups.has(groupName)) groups.set(groupName, []);
            groups.get(groupName).push(entity);
        }

        for (const [groupName, groupEntities] of groups) {
            lines.push(`' ${'─'.repeat(30)}`);
            lines.push(`' ${groupName.toUpperCase()}`);
            lines.push(`' ${'─'.repeat(30)}`);
            lines.push('');
            for (const entity of groupEntities) {
                lines.push(`entity "${entity.tableName}" as ${entity.shortName} {`);
                const pkProps = entity.properties.filter(p => p.name.toLowerCase() === 'id');
                const otherProps = entity.properties.filter(p => p.name.toLowerCase() !== 'id');
                for (const prop of pkProps) lines.push(`    * ${prop.name} : ${prop.type}`);
                if (pkProps.length > 0 && otherProps.length > 0) lines.push(`    --`);
                for (const prop of otherProps.slice(0, 15)) lines.push(`    ${prop.name} : ${prop.type}`);
                if (otherProps.length > 15) lines.push(`    .. +${otherProps.length - 15} more ..`);
                lines.push(`}`);
                lines.push('');
            }
        }

        lines.push(`' ${'─'.repeat(30)}`);
        lines.push(`' RELATIONSHIPS`);
        lines.push(`' ${'─'.repeat(30)}`);
        lines.push('');
        const seen = new Set();
        for (const rel of relationships) {
            const src = entityMap.get(rel.source), tgt = entityMap.get(rel.target);
            if (!src || !tgt) continue;
            const k = `${src.shortName}->${tgt.shortName}`;
            if (seen.has(k)) continue; seen.add(k);
            lines.push(`${src.shortName} ||--o{ ${tgt.shortName}`);
        }
        for (const entity of entities) {
            if (entity.properties.some(p => p.name === 'ParentId')) {
                const k = `${entity.shortName}->${entity.shortName}`;
                if (!seen.has(k)) { seen.add(k); lines.push(`${entity.shortName} ||--o{ ${entity.shortName}`); }
            }
        }
        lines.push('');
        lines.push('@enduml');
        return lines.join('\n');
    }

    // ---- Render using kroki.io (reliable PlantUML renderer) ----
    async function renderDiagram(pumlContent) {
        loadingOverlay.classList.add('active');
        
        try {
            // Use kroki.io which accepts raw PlantUML text directly
            const response = await fetch('https://kroki.io/plantuml/png', {
                method: 'POST',
                headers: {
                    'Content-Type': 'text/plain'
                },
                body: pumlContent
            });
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            
            const blob = await response.blob();
            
            if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
            currentBlobUrl = URL.createObjectURL(blob);
            diagramImage.src = currentBlobUrl;
            diagramImage.style.display = 'block';
            placeholder.classList.add('hidden');
            zoomControls.style.display = 'flex';
            downloadPngBtn.style.display = 'flex';
            downloadPumlBtn.style.display = 'flex';
            loadingOverlay.classList.remove('active');
            
            currentScale = 1;
            diagramImage.style.transform = `scale(${currentScale})`;
            zoomLevelEl.textContent = '100%';
            
        } catch (err) {
            console.error('Kroki render error:', err);
            
            // Fallback: try PlantUML public server with simple URL encoding
            try {
                console.log('Trying PlantUML public server fallback...');
                const encoded = encodeURIComponent(pumlContent);
                const url = `https://www.plantuml.com/plantuml/png/${encoded}`;
                const resp2 = await fetch(url);
                if (!resp2.ok) throw new Error('PlantUML public server also failed');
                const blob2 = await resp2.blob();
                
                if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
                currentBlobUrl = URL.createObjectURL(blob2);
                diagramImage.src = currentBlobUrl;
                diagramImage.style.display = 'block';
                placeholder.classList.add('hidden');
                zoomControls.style.display = 'flex';
                downloadPngBtn.style.display = 'flex';
                downloadPumlBtn.style.display = 'flex';
                loadingOverlay.classList.remove('active');
                currentScale = 1;
                diagramImage.style.transform = `scale(${currentScale})`;
                zoomLevelEl.textContent = '100%';
                
            } catch (fallbackErr) {
                console.error('All render methods failed:', fallbackErr);
                loadingOverlay.classList.remove('active');
                updateStatus('❌ Failed to render diagram. Check console.', 'error');
            }
        }
    }

    // ---- Zoom controls ----
    function zoomIn() {
        currentScale = Math.min(5, currentScale * 1.25);
        diagramImage.style.transform = `scale(${currentScale})`;
        zoomLevelEl.textContent = Math.round(currentScale * 100) + '%';
    }

    function zoomOut() {
        currentScale = Math.max(0.1, currentScale / 1.25);
        diagramImage.style.transform = `scale(${currentScale})`;
        zoomLevelEl.textContent = Math.round(currentScale * 100) + '%';
    }

    function zoomReset() {
        currentScale = 1;
        diagramImage.style.transform = `scale(${currentScale})`;
        zoomLevelEl.textContent = '100%';
    }

    // Only scroll with mouse wheel, no zoom
    diagramWrapper.addEventListener('wheel', (e) => {
        // Do nothing - let the default scroll behavior work
        // No zoom on mouse wheel anymore
    }, { passive: true });

    // ---- Main flow ----
    async function parseAndGenerate() {
        if (!projectRootHandle) {
            alert('Please select a project root folder first.');
            return;
        }
        try {
            updateStatus('🔍 Searching...', 'info');
            const snapshotFile = await findSnapshotFile(projectRootHandle);
            snapshotFileName = snapshotFile.name;
            updateStatus(`📄 ${snapshotFileName}`, 'success');

            const content = await readFileContent(snapshotFile.handle);
            console.log('File size:', content.length, 'bytes');

            const { entities, relationships, entityMap } = parseModelSnapshot(content);

            generatedPuml = buildPlantUML(entities, relationships, entityMap);
            console.log('PUML generated, length:', generatedPuml.length);

            await renderDiagram(generatedPuml);

            statsBar.style.display = 'flex';
            statsBar.innerHTML = `
                <div class="stat-chip">📊 <strong>${entities.length}</strong> entities</div>
                <div class="stat-chip">🔗 <strong>${relationships.length}</strong> relationships</div>
                <div class="stat-chip">📄 <strong>${snapshotFileName}</strong></div>
            `;
            updateStatus(`✅ ${entities.length} entities, ${relationships.length} relationships`, 'success');

        } catch (err) {
            console.error(err);
            updateStatus(`❌ ${err.message}`, 'error');
        }
    }

    function downloadPng() {
        if (!currentBlobUrl) { alert('No diagram to download.'); return; }
        const a = document.createElement('a');
        a.href = currentBlobUrl;
        a.download = snapshotFileName.replace(/\.cs$/i, '') + '.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    function downloadPuml() {
        if (!generatedPuml) { alert('No PUML generated yet.'); return; }
        const blob = new Blob([generatedPuml], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = snapshotFileName.replace(/\.cs$/i, '') + '.puml';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    // ---- Event listeners ----
    selectRootBtn.addEventListener('click', selectProjectRoot);
    parseBtn.addEventListener('click', parseAndGenerate);
    downloadPngBtn.addEventListener('click', downloadPng);
    downloadPumlBtn.addEventListener('click', downloadPuml);
    zoomInBtn.addEventListener('click', zoomIn);
    zoomOutBtn.addEventListener('click', zoomOut);
    zoomResetBtn.addEventListener('click', zoomReset);

    parseBtn.disabled = true;
</script>
</body>
</html>
